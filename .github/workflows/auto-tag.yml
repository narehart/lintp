name: Auto Tag on Version Change

on:
  push:
    branches:
      - main

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Auto Tag
        uses: ButlerLogic/action-autotag@stable
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          strategy: regex
          root: Cargo.toml
          regex_pattern: 'version\s*=\s*"([0-9]+\.[0-9]+\.[0-9]+)"'
          tag_prefix: "v"