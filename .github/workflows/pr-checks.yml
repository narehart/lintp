name: PR Checks

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install asdf
        uses: asdf-vm/actions/setup@v3

      - name: Install tools from .tool-versions
        run: |
          asdf plugin add nodejs
          asdf plugin add rust
          # Override Node.js version for CI compatibility with Vite 7
          asdf install nodejs 20.19.0
          asdf local nodejs 20.19.0
          asdf install rust

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install asdf
        uses: asdf-vm/actions/setup@v3

      - name: Install tools from .tool-versions
        run: |
          asdf plugin add nodejs
          asdf plugin add rust
          # Override Node.js version for CI compatibility with Vite 7
          asdf install nodejs 20.19.0
          asdf local nodejs 20.19.0
          asdf install rust

      - name: Install dependencies
        run: npm ci

      - name: Run linters
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install asdf
        uses: asdf-vm/actions/setup@v3

      - name: Install tools from .tool-versions
        run: |
          asdf plugin add nodejs
          asdf plugin add rust
          # Override Node.js version for CI compatibility with Vite 7
          asdf install nodejs 20.19.0
          asdf local nodejs 20.19.0
          asdf install rust

      - name: Install dependencies
        run: npm ci

      - name: Run type checks
        run: npm run check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install asdf
        uses: asdf-vm/actions/setup@v3

      - name: Install tools from .tool-versions
        run: |
          asdf plugin add nodejs
          asdf plugin add rust
          # Override Node.js version for CI compatibility with Vite 7
          asdf install nodejs 20.19.0
          asdf local nodejs 20.19.0
          asdf install rust

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install asdf
        uses: asdf-vm/actions/setup@v3

      - name: Install tools from .tool-versions
        run: |
          asdf plugin add nodejs
          asdf plugin add rust
          # Override Node.js version for CI compatibility with Vite 7
          asdf install nodejs 20.19.0
          asdf local nodejs 20.19.0
          asdf install rust

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-tarpaulin binary
        run: |
          wget -qO- https://github.com/xd009642/tarpaulin/releases/download/0.27.3/cargo-tarpaulin-x86_64-unknown-linux-musl.tar.gz | tar -xzf-
          mv cargo-tarpaulin ~/.cargo/bin/

      - name: Install dependencies
        run: npm ci

      - name: Run coverage
        run: npm run coverage

      - name: Check coverage thresholds
        run: npm run coverage:check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install asdf
        uses: asdf-vm/actions/setup@v3

      - name: Install tools from .tool-versions
        run: |
          asdf plugin add nodejs
          asdf plugin add rust
          # Override Node.js version for CI compatibility with Vite 7
          asdf install nodejs 20.19.0
          asdf local nodejs 20.19.0
          asdf install rust

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
