name: Publish to NPM

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary-name: lintp-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary-name: lintp-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary-name: lintp-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary-name: lintp-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary-name: lintp.exe
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Prepare binary
        run: |
          mkdir -p dist/bin
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/lintp.exe dist/bin/${{ matrix.binary-name }}
          else
            cp target/${{ matrix.target }}/release/lintp dist/bin/${{ matrix.binary-name }}
            chmod +x dist/bin/${{ matrix.binary-name }}
          fi
        shell: bash
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/bin/${{ matrix.binary-name }}
  
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Sync TOML to package.json
        run: npm run sync-toml
      
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: bin/
      
      - name: List binaries
        run: |
          ls -la bin/
          chmod +x bin/* || true
      
      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}