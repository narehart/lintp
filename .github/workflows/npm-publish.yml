name: Publish to NPM

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            package.json
            package-lock.json
            Cargo.toml
            scripts/
            index.js
            bin/
            README.md
            .npmignore
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Sync TOML to package.json
        run: npm run sync-toml

      - name: Download release assets
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: ${{ github.repository }}
          version: ${{ github.event.release.tag_name }}
          regex: true
          file: "lintp-.*"
          target: "bin/"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: List and prepare binaries
        run: |
          ls -la bin/
          chmod +x bin/* || true

      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
