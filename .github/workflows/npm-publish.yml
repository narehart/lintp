name: Publish to NPM

# Manual fallback only: release.yml already publishes to npm when
# release-please creates a release, so triggering on release events
# here would double-publish.
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            package.json
            package-lock.json
            Cargo.toml
            scripts/
            src/index.ts
            tsconfig.json
            tsconfig.build.json
            bin/
            README.md
          sparse-checkout-cone-mode: false

      - name: Install asdf
        uses: asdf-vm/actions/install@v4

      - name: Set NPM registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Sync TOML to package.json
        run: npm run sync-toml

      # TS only: this workflow must not require cargo/the Rust toolchain.
      # `npm run build` also builds the Rust binary (build:rust); the
      # platform binaries themselves are built and published separately by
      # release.yml's build-binaries job, not by this npm-only fallback.
      - name: Build TypeScript
        run: npm run build:ts

      # Mirrors release.yml's publish-npm job: pin the platform packages as
      # optionalDependencies immediately before publishing so the pinned
      # versions always match the release being published. These are
      # intentionally not checked in (see scripts/sync-optional-deps.ts).
      - name: Pin platform packages as optionalDependencies
        run: npx tsx scripts/sync-optional-deps.ts

      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
