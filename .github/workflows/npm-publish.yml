name: Publish to NPM

on:
  workflow_call:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            package.json
            package-lock.json
            Cargo.toml
            scripts/
            index.ts
            tsconfig.json
            tsconfig.build.json
            bin/
            README.md
            .npmignore
          sparse-checkout-cone-mode: false

      - name: Install asdf
        uses: asdf-vm/actions/install@v4

      - name: Set NPM registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Sync TOML to package.json
        run: npm run sync-toml

      - name: Build TypeScript
        run: npm run build

      - name: Get release tag
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            # For manual workflow dispatch, get the latest release
            LATEST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
            echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release assets
        run: |
          mkdir -p bin
          gh release download ${{ steps.get_tag.outputs.tag }} \
            --pattern "lintp-*" \
            --dir bin/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List and prepare binaries
        run: |
          ls -la bin/
          chmod +x bin/* || true

      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
