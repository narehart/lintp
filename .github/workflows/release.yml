name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      # Generate the App token BEFORE release-please so the release PR is
      # authored by the App, not github-actions[bot]. PRs opened via the
      # default GITHUB_TOKEN are treated as first-time-contributor PRs: their
      # required checks demand manual maintainer approval, and the events they
      # emit never trigger workflows. An App (installed with write access) is a
      # recognized member, so its PRs run checks with no approval and their
      # events trigger workflows normally — which is why no close/reopen kick
      # is needed below.
      #
      # Requires the App to have Contents, Pull requests, AND Issues set to
      # Read and write. Issues:write is what release-please uses for its
      # "autorelease: *" PR labels; without it release-please fails with
      # "Resource not accessible by integration".
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # No release-type/extra-files inputs: passing release-type bypasses
      # release-please-config.json, whose json updater is what keeps
      # package.json's version in sync (extra-files is not a v4 input).
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

      # Auto-merge so the release PR merges itself once the required checks go
      # green; the merge push then re-triggers this workflow to cut the release.
      # No fromJSON: step expressions are evaluated even when the if-guard
      # is false, and fromJSON('') on runs that create no PR is a template
      # error that fails the job (observed on the 0.3.2 and post-merge runs).
      # Gate on the string output and parse the JSON in shell instead.
      - name: Enable auto-merge on the release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          gh pr merge --merge --auto "$(jq -r .number <<< "$RELEASE_PR")" \
            --repo ${{ github.repository }}

  build-binaries:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      # One platform failing must not cancel the others' uploads
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-arm64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-x64-musl
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-arm64-musl
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      # asdf has no Windows build, so this job uses platform-native
      # toolchain actions instead
      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master as of 2026-07-06
        with:
          toolchain: "1.85.0"
          targets: ${{ matrix.target }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".tool-versions"

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      # musl-tools provides musl-gcc, which is all that's needed to link this
      # target natively on an x64 ubuntu runner (no cross toolchain required).
      - name: Install musl build tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      # aarch64 musl has no apt cross-gcc package the way aarch64 gnu does
      # (gcc-aarch64-linux-gnu), so this target cross-compiles via `cross`
      # (Docker-based) instead of a bare cargo build against a host linker.
      - name: Install cross for aarch64 musl cross-compilation
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --locked

      - name: Build binary
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        env:
          # cargo must link aarch64 objects with the cross-gcc, not host ld
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary
        shell: bash
        run: |
          # Asset names must match what the npm wrapper (src/index.ts) downloads:
          # lintp-<target>[.exe] plus a companion .sha256 checksum file.
          binary_name="lintp"
          asset_name="lintp-${{ matrix.target }}"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            binary_name="${binary_name}.exe"
            asset_name="${asset_name}.exe"
          fi

          mkdir -p release-assets
          cp "target/${{ matrix.target }}/release/${binary_name}" "release-assets/${asset_name}"
          cd release-assets
          # macOS lacks sha256sum; Windows git-bash lacks shasum
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${asset_name}" > "${asset_name}.sha256"
          else
            shasum -a 256 "${asset_name}" > "${asset_name}.sha256"
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: release-assets/lintp-${{ matrix.target }}*

      - name: Install dependencies
        run: npm ci

      - name: Publish platform package to npm
        shell: bash
        run: |
          # Cargo.toml is the release's source of truth for the version;
          # sync it into package.json before deriving the platform package
          npm run sync-toml
          PKG_DIR=$(npx tsx scripts/prepare-platform-package.ts --target ${{ matrix.target }} | sed 's/^Platform package ready: //')
          npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}
          npm publish "$PKG_DIR"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-npm:
    needs: [release-please, build-binaries]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install asdf
        uses: asdf-vm/actions/install@v4

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build:ts

      - name: Sync version from Cargo.toml
        run: npm run sync-toml

      - name: Pin platform packages as optionalDependencies
        run: npx tsx scripts/sync-optional-deps.ts

      - name: Configure npm registry
        run: npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crate:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install asdf
        uses: asdf-vm/actions/install@v4

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
