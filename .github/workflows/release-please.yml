name: Release Management

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-check:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Check if release is needed
        id: check
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git rev-list HEAD)
          else
            COMMITS=$(git rev-list $LAST_TAG..HEAD)
          fi

          # Check for feat or fix commits that would trigger a release
          RELEASE_NEEDED=false
          for commit in $COMMITS; do
            MSG=$(git log --format=%s -n 1 $commit)
            if [[ "$MSG" =~ ^(feat|fix|perf|refactor)(\(.*\))?!?: ]] || [[ "$MSG" =~ BREAKING\ CHANGE ]]; then
              RELEASE_NEEDED=true
              break
            fi
          done

          echo "release_needed=$RELEASE_NEEDED" >> $GITHUB_OUTPUT

      - name: Create Release PR
        if: steps.check.outputs.release_needed == 'true'
        run: |
          # Run standard-version in dry-run to check what would be released
          npm run release:dry

          # Create a comment about pending release
          echo "::notice::A release is needed based on recent commits. Run 'npm run release' locally or trigger the release workflow."

  validate-changelog:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'chore(release)')
    steps:
      - uses: actions/checkout@v4

      - name: Validate CHANGELOG exists and is updated
        run: |
          if [ ! -f "CHANGELOG.md" ]; then
            echo "::error::CHANGELOG.md not found!"
            exit 1
          fi

          # Check if CHANGELOG was modified in the release commit
          if ! git diff HEAD~1 HEAD --name-only | grep -q "CHANGELOG.md"; then
            echo "::error::CHANGELOG.md was not updated in the release commit!"
            exit 1
          fi
