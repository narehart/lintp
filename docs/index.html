<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lintp — docs</title>
    <meta
      name="description"
      content="lintp validates directory structure and file naming with a DSL you define in YAML. Written in Rust."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/docs.css" />
  </head>
  <body>
    <div class="page">
      <div class="masthead">
        <strong>lintp</strong><span class="dim"> — 4 dirs, 0 errors</span>
      </div>
      <p class="sub">
        Validate directory structure and file naming with a DSL you define in
        YAML. Written in Rust.
      </p>
      <div class="cmds">
        <a class="cmd" href="https://www.npmjs.com/package/lintp-cli"
          >$ npx lintp-cli</a
        >
        <a class="cmd cmd-alt" href="https://crates.io/crates/lintp"
          >$ cargo install lintp</a
        >
      </div>
      <div class="shot">
        <div class="bar">demo.gif — flagged, renamed, passing</div>
        <img
          class="gif"
          src="demo.gif"
          alt="lintp demo: failing files flagged with the rule condition that failed, then pass after renaming"
        />
      </div>
      <!-- nav-tree -->
      <div class="foot">
        <span>MIT License</span>
        <a class="flink" href="https://github.com/narehart/lintp"
          >github.com/narehart/lintp</a
        >
      </div>
    </div>
  </body>
</html>
